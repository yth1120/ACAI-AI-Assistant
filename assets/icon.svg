<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 背景圆 -->
  <circle cx="128" cy="128" r="120" fill="url(#grad1)"/>
  
  <!-- AI 图标 -->
  <g transform="translate(128, 128)">
    <!-- 大脑轮廓 -->
    <path d="M-40,-50 Q-60,-40 -60,-20 Q-60,0 -50,20 Q-40,35 -20,45 Q0,50 20,45 Q40,35 50,20 Q60,0 60,-20 Q60,-40 40,-50 Q20,-55 0,-55 Q-20,-55 -40,-50 Z" 
          fill="none" stroke="white" stroke-width="6" opacity="0.9"/>
    
    <!-- 神经网络节点 -->
    <circle cx="-30" cy="-20" r="6" fill="white"/>
    <circle cx="0" cy="-25" r="6" fill="white"/>
    <circle cx="30" cy="-20" r="6" fill="white"/>
    <circle cx="-25" cy="10" r="6" fill="white"/>
    <circle cx="0" cy="5" r="6" fill="white"/>
    <circle cx="25" cy="10" r="6" fill="white"/>
    <circle cx="0" cy="30" r="6" fill="white"/>
    
    <!-- 神经网络连接线 -->
    <line x1="-30" y1="-20" x2="0" y2="-25" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-25" x2="30" y2="-20" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="-30" y1="-20" x2="-25" y2="10" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="-25" x2="0" y2="5" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="30" y1="-20" x2="25" y2="10" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="-25" y1="10" x2="0" y2="30" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="0" y1="5" x2="0" y2="30" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="25" y1="10" x2="0" y2="30" stroke="white" stroke-width="2" opacity="0.6"/>
  </g>
  
  <!-- 文字 ACAI -->
  <text x="128" y="220" font-family="Arial, sans-serif" font-size="32" font-weight="bold" 
        text-anchor="middle" fill="white" opacity="0.95">ACAI</text>
</svg>
